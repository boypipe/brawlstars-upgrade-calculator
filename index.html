<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brawl Stars Upgrade Calculator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="https://cdn-assets-eu.frontify.com/s3/frontify-enterprise-files-eu/eyJwYXRoIjoic3VwZXJjZWxsXC9maWxlXC81NFppNkxQZG1XTlc3ZW52cmRBRC5wbmcifQ:supercell:DKeMhdOP9VbUF4qHdA8TcT7yzLX6M4tG_XhKpB8jmbE?width=2400/">
</head>
<body>
  <header>
    <img id="logo" src="https://cdn-assets-eu.frontify.com/s3/frontify-enterprise-files-eu/eyJwYXRoIjoic3VwZXJjZWxsXC9maWxlXC92TkdKVFNwTGptd3prM1U4d2g5bS5wbmcifQ:supercell:Su2dLiHzsZIQf_1wmh2mEMNuZyEA4TSV4hv9ZCgHceQ?width=2400" alt="Brawl Stars Logo">
    <h1>Brawl Stars Upgrade Calculator</h1>
    <img id="title-gif" src="https://cdn-assets-eu.frontify.com/s3/frontify-enterprise-files-eu/eyJwYXRoIjoic3VwZXJjZWxsXC9maWxlXC9pZ2tlbzVkTlNWUWFnR3p0OHVZVy5naWYifQ:supercell:-W7Wbq2w_iWPA9eeDaSbtbNqmcoVABeZM4ScKIoarlk?width=2400" alt="Brawl Stars Animation">
  </header>

  <main>
    <form id="calc-form">
      <div class="row">
        <label for="start_level">Current Level:</label>
        <select id="start_level">
          <option value="">Select</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
        </select>

        <label for="end_level">Desired Level:</label>
        <select id="end_level">
          <option value="">Select</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
        </select>
      </div>

      <div class="row">
        <label>Number of Brawlers: <input type="number" id="brawlers" min="1" value="1"></label>
      </div>

      <div class="row">
        <label><input type="number" id="gadgets" min="0"> <img class="icon" src="https://cdn-assets-eu.frontify.com/s3/frontify-enterprise-files-eu/eyJwYXRoIjoic3VwZXJjZWxsXC9maWxlXC9obzRua25IS0p4SEhxOGFuU2c3NC5wbmcifQ:supercell:tRbE9i8aQ2c5_gmoFeZaCOrOaZtxlLMaznpk87FXW-o?width=2400" alt="Gadget"></label>
        <label><input type="number" id="star_powers" min="0"> <img class="icon" src="https://cdn-assets-eu.frontify.com/s3/frontify-enterprise-files-eu/eyJwYXRoIjoic3VwZXJjZWxsXC9maWxlXC84elprZDdNS3NUaGUyRUtnblZZay5wbmcifQ:supercell:k2BiKhdZKfKf4kxe1b926Us5DMBu0i1vMBaKt6I2c3A?width=2400" alt="Star Power"></label>
      </div>

      <div class="row">
        <label><input type="number" id="gears" min="0"> <img class="icon" src="https://cdn-assets-eu.frontify.com/s3/frontify-enterprise-files-eu/eyJwYXRoIjoic3VwZXJjZWxsXC9maWxlXC84dWk2ZlBCRUV3d1kzM0xyN3dBeS5wbmcifQ:supercell:uoGeMiqkmPXdKOp-2MG0f-0bOa1QknUcHuKnKIUmpMY?width=2400" alt="Gear"></label>
        <label><input type="number" id="epic_gears" min="0"> <img class="icon" src="https://cdn-assets-eu.frontify.com/s3/frontify-enterprise-files-eu/eyJwYXRoIjoic3VwZXJjZWxsXC9maWxlXC9zQXZLSjlTMkdYY1h2UGM5Z1hhcy5wbmcifQ:supercell:D5Z7IYbvCcE6aP-zKH9W7wlUIuVZ4RpvLHqqGguq_W8?width=2400" alt="Epic Gear"></label>
      </div>

      <div class="row">
        <label><input type="number" id="mythic_gears" min="0"> <img class="icon" src="https://cdn-assets-eu.frontify.com/s3/frontify-enterprise-files-eu/eyJwYXRoIjoic3VwZXJjZWxsXC9maWxlXC9tdVEzcURvZEZNU05VYjJvZ1VYZS5wbmcifQ:supercell:IlHEra7RSQaX0Qf_aoGrcfldJHoE4292IoBwGskmZ34?width=2400" alt="Mythic Gear"></label>
        <label><input type="number" id="hypercharge" min="0"> <img class="icon" src="https://cdn-assets-eu.frontify.com/s3/frontify-enterprise-files-eu/eyJwYXRoIjoic3VwZXJjZWxsXC9maWxlXC9xUHExeXNQMTQ2aTg4dDJqaWR1Ti5wbmcifQ:supercell:MbA3cNNtPkLW6Gs3KQlirhbbT8F0-NUUzYJmSeFnbo8?width=2400" alt="Hypercharge"></label>
      </div>

      <div class="buttons">
        <button type="button" id="calculateBtn">Calculate</button>
        <button type="button" id="resetBtn">Reset</button>
      </div>
      
      <div class="preset-button">
        <button type="button" id="maxBrawlerBtn">Max Brawler (Normal Gears)</button>
      </div>
    </form>

    <div id="results"></div>
  </main>

  <footer>
    All rights reserved by Supercell • Coded using ChatGPT </footer>

  <script src="script.js"></script>
</body>
</html>
